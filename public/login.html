<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Co-Pilot · LOGIN</title>
<link rel="icon" type="image/png" href="./Favicon.png">
<link rel="stylesheet" href="./co-pilot-design-system.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Keyboard-only Focus-Ring (A11y) */
  :focus { outline: none; }
  :focus-visible { outline: var(--cp-border) solid var(--cp-orange); outline-offset: 2px; }
  input:focus-visible { outline: none; } /* Inputs haben eigenen Glow */

  body {
    min-height: 100vh;
    background: var(--cp-navy);
    color: var(--cp-off-white);
    font-family: var(--cp-font-ui);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 5vw, 40px);
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--cp-line) var(--px), transparent var(--px)),
      linear-gradient(90deg, var(--cp-line) var(--px), transparent var(--px));
    background-size: clamp(20px, 4vw, 28px) clamp(20px, 4vw, 28px);
    opacity: 0.25;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 70%);
  }

  .logo {
    width: clamp(220px, 32vw, 313px);
    height: auto;
    margin-bottom: clamp(24px, 4vw, 40px);
    filter: drop-shadow(0 0 40px rgba(255,145,77,0.15));
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--cp-navy-deep);
    border: var(--cp-border-chunky) solid var(--cp-orange);
    border-radius: var(--cp-radius-card);
    padding: clamp(24px, 5vw, 40px) clamp(20px, 4vw, 36px);
    box-shadow: var(--cp-shadow-pixel-lg);
    position: relative;
    z-index: 1;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: calc(clamp(24px, 5vw, 40px) * -1) calc(clamp(20px, 4vw, 36px) * -1) clamp(24px, 4vw, 32px);
    padding: 10px clamp(20px, 4vw, 36px);
    background: var(--cp-orange);
    color: var(--cp-black);
    border-bottom: var(--cp-border) solid var(--cp-black);
    border-top-left-radius: calc(var(--cp-radius-card) - 2px);
    border-top-right-radius: calc(var(--cp-radius-card) - 2px);
    font-family: var(--cp-font-display);
    font-size: clamp(0.625rem, 1.6vw, 0.75rem);
    letter-spacing: 0.08em;
  }
  .card-header .dots { display: flex; gap: 6px; }
  .card-header .dot {
    width: 10px; height: 10px;
    background: #1F1F1F;
    border-radius: 1px;
  }
  .card-header .dot:nth-child(2) { opacity: 0.55; }
  .card-header .dot:nth-child(3) { opacity: 0.3; }

  .greeting {
    font-family: var(--cp-font-display);
    font-size: clamp(1.125rem, 3.2vw, 1.5rem);
    color: var(--cp-orange);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .greeting::before {
    content: '> ';
    color: var(--cp-off-white);
    font-family: var(--cp-font-mono);
  }

  .subheading {
    font-family: var(--cp-font-mono);
    font-size: clamp(1rem, 1.8vw, 1.125rem);
    color: #D8DDE2;
    margin-bottom: clamp(20px, 3.5vw, 28px);
    line-height: 1.4;
  }

  label {
    display: block;
    font-family: var(--cp-font-display);
    font-size: 0.625rem;
    color: var(--cp-orange);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  label::before { content: '> '; color: var(--cp-off-white); font-family: var(--cp-font-mono); font-size: 1.2em; }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--cp-off-white);
    color: var(--cp-black);
    border: var(--cp-border) solid var(--cp-black);
    border-radius: var(--cp-radius-chip);
    padding: 14px 16px;
    font-family: var(--cp-font-mono);
    font-size: 1.125rem;
    letter-spacing: 0.02em;
    outline: none;
    box-shadow: var(--px) var(--px) 0 var(--cp-orange-deep);
    margin-bottom: 20px;
    transition: box-shadow var(--cp-dur) var(--cp-ease);
    min-height: 48px;
  }
  input[type="email"]:focus, input[type="password"]:focus { box-shadow: var(--cp-shadow-glow); }
  input::placeholder { color: #9AA3AC; }

  button[type="submit"] {
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--cp-orange);
    color: var(--cp-black);
    border: var(--cp-border) solid var(--cp-black);
    border-radius: var(--cp-radius-chip);
    padding: 14px 18px;
    font-family: var(--cp-font-display);
    font-size: clamp(0.75rem, 1.6vw, 0.875rem);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--cp-shadow-pixel);
    transition: transform var(--cp-dur) var(--cp-ease), box-shadow var(--cp-dur) var(--cp-ease), background var(--cp-dur) var(--cp-ease);
    margin-top: 8px;
    min-height: 52px;
  }
  button[type="submit"]:hover {
    background: var(--cp-orange-soft);
    transform: translate(-1px, -1px);
    box-shadow: var(--cp-shadow-pixel-lg);
  }
  button[type="submit"]:active {
    transform: translate(2px, 2px);
    box-shadow: 0 0 0 var(--cp-black);
  }
  button[type="submit"]:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  .btn-icon {
    display: inline-grid;
    place-items: center;
    width: 24px; height: 24px;
    background: var(--cp-black);
    border: var(--cp-border) solid var(--cp-black);
    border-radius: 2px;
    color: var(--cp-off-white);
    line-height: 0;
  }
  .btn-icon svg { width: 10px; height: 10px; fill: currentColor; shape-rendering: crispEdges; }

  .error {
    display: none;
    background: rgba(255, 107, 107, 0.08);
    border: var(--cp-border) solid var(--cp-danger, #FF6B6B);
    border-radius: var(--cp-radius-chip);
    padding: 12px 14px;
    font-family: var(--cp-font-mono);
    font-size: 1rem;
    color: var(--cp-danger, #FF6B6B);
    margin-top: 16px;
    line-height: 1.4;
  }
  .error::before { content: '! '; font-weight: 700; }
  .error.show { display: block; }

  .footer-note {
    margin-top: clamp(20px, 3.5vw, 28px);
    padding-top: clamp(16px, 3vw, 20px);
    border-top: 1px dashed rgba(255,145,77,0.35);
    font-family: var(--cp-font-mono);
    font-size: 1rem;
    color: #9AA3AC;
    text-align: center;
    line-height: 1.5;
  }
  .footer-note strong { color: var(--cp-orange); font-weight: normal; }

  /* ═══════════════════════════════════════════════════════════════════════════
     BOOT LOADER — shown after successful login submit, while /api/login runs
     and user is forwarded to /. Mirrors the index.html intro visually.
     ═══════════════════════════════════════════════════════════════════════════ */
  #bootIntro {
    position: fixed; inset: 0; z-index: 10000; overflow: hidden;
    background: var(--cp-navy); display: none;
    cursor: default;
  }
  #bootIntro.on { display: block; animation: loginBootIn .35s ease-out both; }
  @keyframes loginBootIn { from { opacity: 0; } to { opacity: 1; } }

  .boot-logo {
    position: absolute; top: 44%; left: 50%; transform: translate(-50%, -50%);
    display: flex; align-items: center; gap: 2px; white-space: nowrap;
    font-family: var(--cp-font-display); font-size: clamp(22px, 5vw, 44px);
    line-height: 1;
  }
  .boot-logo span {
    display: inline-block; padding: 0 2px;
    background: linear-gradient(180deg,
      #FFE6CE 0%, #FFB07A 22%, var(--cp-orange) 48%, #7A3210 52%,
      var(--cp-orange) 56%, #FFB07A 78%, #FFE6CE 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter:
      drop-shadow(2px 3px 0 #1F1F1F)
      drop-shadow(3px 4px 0 rgba(0,0,0,.55));
    animation: loginBootWave 1.6s ease-in-out infinite;
  }
  .boot-logo span:nth-child(1) { animation-delay: 0.00s; }
  .boot-logo span:nth-child(2) { animation-delay: 0.08s; }
  .boot-logo span:nth-child(3) { animation-delay: 0.16s; }
  .boot-logo span:nth-child(4) { animation-delay: 0.24s; }
  .boot-logo span:nth-child(5) { animation-delay: 0.32s; }
  .boot-logo span:nth-child(6) { animation-delay: 0.40s; }
  .boot-logo span:nth-child(7) { animation-delay: 0.48s; }
  .boot-logo span:nth-child(8) { animation-delay: 0.56s; }
  @keyframes loginBootWave {
    0%, 100% { transform: translateY(0); }
    25%      { transform: translateY(-14px); }
    50%      { transform: translateY(0); }
    75%      { transform: translateY(14px); }
  }

  .boot-loader {
    position: absolute; top: 58%; left: 50%; transform: translateX(-50%);
    width: min(520px, 72vw);
    display: flex; flex-direction: column; gap: 10px;
  }
  .boot-loader-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: var(--cp-font-display); font-size: 10px; letter-spacing: 3px;
    color: var(--cp-orange);
  }
  .boot-loader-row .boot-pct {
    color: var(--cp-off-white); font-size: 11px; letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .boot-loader-bar {
    height: 14px; background: rgba(0,0,0,.55); position: relative; overflow: hidden;
    box-shadow:
      inset 0 0 0 2px var(--cp-orange),
      4px 4px 0 0 rgba(255,145,77,.25);
  }
  .boot-loader-fill {
    position: absolute; top: 0; bottom: 0; left: 0; width: 0;
    background: linear-gradient(90deg,
      #FFE6CE 0%, #FFB07A 20%, var(--cp-orange) 50%, #FFB07A 80%, #FFE6CE 100%);
    background-size: 240% 100%;
    box-shadow: inset 0 -3px 0 rgba(122,50,16,.55);
    transition: width 1.8s cubic-bezier(.25,.6,.2,1);
    animation: loginBootShimmer 1.2s linear infinite;
  }
  .boot-loader-bar::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(90deg,
      transparent 0 10px,
      rgba(0,0,0,.28) 10px 12px);
    mix-blend-mode: multiply;
  }
  @keyframes loginBootShimmer { from { background-position: 240% 0; } to { background-position: 0 0; } }

  @media (prefers-reduced-motion: reduce) {
    .boot-logo span, .boot-loader-fill { animation: none !important; }
  }
</style>
</head>
<body class="cp-root">

<img class="logo" src="./Logo.png" alt="CO-PILOT">

<div class="card">
  <div class="card-header">
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <span>LOGIN.EXE</span>
  </div>

  <h2 class="greeting">Moin.</h2>
  <p class="subheading">Email &amp; Passwort — dann geht's los.</p>

  <form id="loginForm">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="du@beispiel.de" autocomplete="email" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="email" autofocus />
    <label for="password">Passwort</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    <button type="submit" id="submitBtn">
      <span class="btn-icon"><svg viewBox="0 0 10 10"><polygon points="2,1 2,9 9,5"/></svg></span>
      <span id="btnLabel">START</span>
    </button>
    <div class="error" id="errorMsg">Email oder Passwort falsch. Nochmal.</div>
  </form>

  <p class="footer-note">Kein Passwort? Meld dich bei <strong>Constantin</strong>.</p>
</div>

<!-- Boot loader — hidden until login succeeds, then takes over the screen while /api/login + redirect run -->
<div id="bootIntro" aria-hidden="true">
  <div class="boot-logo">
    <span>C</span><span>O</span><span>-</span><span>P</span><span>I</span><span>L</span><span>O</span><span>T</span>
  </div>
  <div class="boot-loader">
    <div class="boot-loader-row">
      <span>INITIALIZING SESSION</span>
      <span class="boot-pct">000%</span>
    </div>
    <div class="boot-loader-bar"><div class="boot-loader-fill"></div></div>
  </div>
</div>

<script>
// ─── Boot-loader takeover on successful login ───────────────────────────────
const bootIntro = document.getElementById('bootIntro');
const bootPct   = bootIntro && bootIntro.querySelector('.boot-pct');
const bootFill  = bootIntro && bootIntro.querySelector('.boot-loader-fill');

function startBootLoader() {
  if (!bootIntro) return;
  bootIntro.classList.add('on');
  // Kick off the fill bar (CSS transition handles the visual ramp)
  requestAnimationFrame(() => { if (bootFill) bootFill.style.width = '100%'; });
  // Animated percentage counter — 1.8s, ease-out
  const duration = 1800, t0 = performance.now();
  (function tick(now) {
    const elapsed = (now || performance.now()) - t0;
    const t = Math.min(1, elapsed / duration);
    const eased = 1 - Math.pow(1 - t, 2.2);
    if (bootPct) bootPct.textContent = String(Math.floor(eased * 100)).padStart(3, '0') + '%';
    if (t < 1) requestAnimationFrame(tick);
  })();
  // Mark the home-intro as "seen" so it doesn't replay right after redirect
  try { sessionStorage.setItem('coPilotIntroSeen', '1'); } catch {}
}

function hideBootLoader() {
  if (bootIntro) bootIntro.classList.remove('on');
  if (bootFill) bootFill.style.width = '0';
  if (bootPct) bootPct.textContent = '000%';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const label = document.getElementById('btnLabel');
  const err = document.getElementById('errorMsg');
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;

  if (!email || !email.includes('@')) {
    err.textContent = 'Bitte eine gültige Email eingeben.';
    err.classList.add('show');
    document.getElementById('email').focus();
    return;
  }

  btn.disabled = true;
  label.textContent = 'LOADING...';
  err.classList.remove('show');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });

    if (res.ok) {
      label.textContent = 'OK →';
      // Show boot loader, then hand off to home once the fill animation completes.
      startBootLoader();
      setTimeout(() => { window.location.href = '/'; }, 1900);
    } else {
      err.textContent = 'Email oder Passwort falsch. Nochmal.';
      err.classList.add('show');
      btn.disabled = false;
      label.textContent = 'START';
      document.getElementById('password').focus();
    }
  } catch {
    err.textContent = 'Verbindungsfehler. Kurz warten und nochmal.';
    err.classList.add('show');
    btn.disabled = false;
    label.textContent = 'START';
    hideBootLoader();
  }
});
</script>
</body>
</html>
